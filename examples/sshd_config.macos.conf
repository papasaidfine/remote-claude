# Example drop-in the bootstrap tool writes to
#   /etc/ssh/sshd_config.d/100-claude-dev-tunnel.conf
# on macOS (loaded via the "Include /etc/ssh/sshd_config.d/*" line at the top
# of /etc/ssh/sshd_config; for sshd, the first obtained value wins, so this
# file overrides the defaults below it).
#
# Roll back by simply deleting this file and reloading sshd:
#   sudo rm /etc/ssh/sshd_config.d/100-claude-dev-tunnel.conf
#   sudo launchctl kickstart -k system/com.openssh.sshd

# Managed by reverse-ssh-bootstrap (claude-dev-tunnel). Delete this file to roll back.
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys

# Optional (chosen interactively): key-only login.
# On macOS both directives are needed — passwords can also come in through
# keyboard-interactive/PAM.
PasswordAuthentication no
KbdInteractiveAuthentication no

# Optional (chosen interactively): loopback only. The local sshd exists for
# the reverse tunnel, so nothing outside this machine needs to reach it.
# Note: this disables direct SSH into this Mac from the LAN.
ListenAddress 127.0.0.1
ListenAddress ::1
